name: Build Qt Application

on:
    push:
        branches: [ main, master ]
    pull_request:
        branches: [ main, master ]
    workflow_dispatch:

jobs:
    build-macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Qt
              uses: jurplel/install-qt-action@v4
              with:
                  version: "6.5.*"
                  modules: "qt5compat"
                  cache: true
                  tools: "tools_ninja"
                  install-deps: "true"

            - name: Build with qmake
              run: |
                  qmake Clouck.pro CONFIG+=release
                  make

            - name: Create macOS Bundle
              run: |
                  macdeployqt build/Clouck.app -dmg

            - name: Upload macOS Build
              uses: actions/upload-artifact@v7
              with:
                  name: Clouck-qmake
                  path: build/Clouck.dmg

    build-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup MSVC Environment
              uses: ilammy/msvc-dev-cmd@v1

            - name: Install Qt
              uses: jurplel/install-qt-action@v4
              with:
                  version: "6.5.*"
                  modules: "qt5compat"
                  cache: true
                  tools: "tools_ninja"
                  install-deps: "true"

            - name: Build with qmake
              shell: cmd
              run: |
                  qmake Clouck.pro CONFIG+=release
                  nmake

            - name: Deploy Windows Build
              run: |
                  mkdir Clouck-windows-dist
                  copy build\Clouck.exe Clouck-windows-dist\
                  windeployqt --release Clouck-windows-dist\Clouck.exe

            - name: Upload Windows Build
              uses: actions/upload-artifact@v7
              with:
                  name: Clouck-windows-qmake
                  path: Clouck-windows-dist

